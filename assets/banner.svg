<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="perpetual" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#011a0a"/>
      <stop offset="60%" stop-color="#003318"/>
      <stop offset="100%" stop-color="#006633"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#29ff75"/>
      <stop offset="40%" stop-color="#44ffcc"/>
      <stop offset="80%" stop-color="#5af1ff"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <pattern id="scanlines" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#000000" opacity="0.18"/>
    </pattern>
    <!-- loop arrows symbol -->
    <symbol id="loop" viewBox="0 0 80 80">
      <path d="M40 12 A28 28 0 1 1 12 40" fill="none" stroke="#29ff75" stroke-width="3" opacity="0.7"/>
      <polygon points="12,28 12,52 24,40" fill="#29ff75" opacity="0.7"/>
    </symbol>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- loop symbols, flanking -->
  <use href="#loop" x="30" y="120" width="80" height="80" opacity="0.5"/>
  <use href="#loop" x="1090" y="120" width="80" height="80" opacity="0.5" transform="scale(-1,1) translate(-2280,0)"/>

  <!-- PERPETUAL wordmark, centered -->
  <text x="606" y="236" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="180" font-weight="900"
        fill="#29ff75" opacity="0.4"
        letter-spacing="8">PERPETUAL</text>
  <text x="600" y="230" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="180" font-weight="900"
        fill="url(#title)"
        letter-spacing="8">PERPETUAL</text>

  <!-- frame scanlines -->
  <line x1="0" y1="2"   x2="1200" y2="2"   stroke="#00f0ff" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="318" x2="1200" y2="318" stroke="#29ff75" stroke-width="2" opacity="0.6"/>

  <!-- subtle CRT scanlines overlay -->
  <rect width="1200" height="320" fill="url(#scanlines)"/>
</svg>
